<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Virtual Office — AI Investment Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#fdf4e6; --paper2:#fbedd9; --ink:#5b4636; --ink-soft:#8a7257;
    --line:rgba(120,90,60,.16); --accent:#e0913f;
    --shadow:0 10px 30px rgba(120,80,40,.18), 0 2px 8px rgba(120,80,40,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:'Nunito',system-ui,sans-serif;color:var(--ink);background:#e9b6a0}
  #scene{position:fixed;inset:0;z-index:0}
  #scene canvas{display:block}
  /* warm Lo-Fi color grade over the 3D canvas */
  #grade{position:fixed;inset:0;z-index:5;pointer-events:none;
    background:
      radial-gradient(120% 100% at 50% 38%, rgba(255,228,176,.10) 0%, rgba(255,196,140,0) 42%, rgba(120,68,46,.30) 100%),
      linear-gradient(180deg, rgba(255,206,150,.12), rgba(150,84,70,.16));
    mix-blend-mode:multiply}
  #grade2{position:fixed;inset:0;z-index:6;pointer-events:none;
    background:radial-gradient(100% 80% at 42% 30%, rgba(255,224,170,.22), rgba(255,224,170,0) 55%);
    mix-blend-mode:screen}
  .mono{font-family:'Space Mono',monospace}

  /* ---------- top bar ---------- */
  #topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;pointer-events:none}
  .brand{display:flex;align-items:center;gap:12px;pointer-events:auto}
  .brand .mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#f0a35f,#e0764f);
    display:grid;place-items:center;color:#fff;font-weight:900;font-size:19px;box-shadow:var(--shadow);transform:rotate(-6deg)}
  .brand h1{font-size:18px;font-weight:900;letter-spacing:.06em}
  .brand .sub{font-size:11px;color:var(--ink-soft);font-weight:700;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
  .live{display:inline-block;width:7px;height:7px;border-radius:50%;background:#46c187;box-shadow:0 0 0 0 rgba(70,193,135,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(70,193,135,.55)}70%{box-shadow:0 0 0 7px rgba(70,193,135,0)}100%{box-shadow:0 0 0 0 rgba(70,193,135,0)}}
  .topright{display:flex;align-items:center;gap:10px;pointer-events:auto}
  .pillbox{background:rgba(253,244,230,.82);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:14px;
    padding:8px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;font-weight:800}
  .pillbox .wx{font-size:16px}
  .pillbox .clk{font-size:16px;letter-spacing:.04em}
  .pillbox .day{font-size:11px;color:var(--ink-soft);font-weight:700}
  .btn{pointer-events:auto;cursor:pointer;border:1px solid var(--line);background:rgba(253,244,230,.82);backdrop-filter:blur(8px);
    color:var(--ink);font-family:inherit;font-weight:800;font-size:12.5px;border-radius:13px;padding:9px 14px;box-shadow:var(--shadow);
    transition:transform .12s ease, background .15s}
  .btn:hover{transform:translateY(-1px);background:#fff}
  .btn:active{transform:translateY(0)}

  /* ---------- roster ---------- */
  #roster{position:fixed;top:64px;left:20px;z-index:25;display:flex;flex-wrap:wrap;gap:7px;max-width:340px}
  .rchip{cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--ink);white-space:nowrap;
    background:rgba(253,244,230,.8);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:999px;padding:6px 12px 6px 9px;
    box-shadow:0 4px 12px rgba(120,80,40,.12);transition:transform .12s, background .15s}
  .rchip:hover{transform:translateY(-1px);background:#fff}
  .rchip .rdot{width:9px;height:9px;border-radius:50%;background:var(--c);box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 25%,transparent)}

  /* ---------- floating agent tags ---------- */
  #labels{position:fixed;inset:0;z-index:15;pointer-events:none}
  .tag{position:absolute;top:0;left:0;pointer-events:auto;cursor:pointer;display:flex;align-items:center;gap:7px;
    background:rgba(253,244,230,.92);backdrop-filter:blur(6px);border:1.5px solid var(--c);border-radius:999px;
    padding:4px 11px 4px 8px;box-shadow:0 6px 16px rgba(120,80,40,.22);font-weight:800;font-size:12px;white-space:nowrap;
    transition:opacity .2s, transform .12s}
  .tag:hover{transform:translate(-50%,-50%) translate(var(--tx,0),var(--ty,0)) scale(1.05)}
  .tag .dot{width:8px;height:8px;border-radius:50%;background:#b9a88f;flex:none}
  .tag .nm{color:var(--ink)}
  .tag .st{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#a08a6e;
    border-left:1px solid var(--line);padding-left:7px;margin-left:1px}
  .tag.working .dot{background:#46c187;box-shadow:0 0 0 3px rgba(70,193,135,.25);animation:blink 1s infinite}
  .tag.working .st{color:#2f9b6b}
  .tag.thinking .dot{background:#eaa64a;box-shadow:0 0 0 3px rgba(234,166,74,.25);animation:blink 1.4s infinite}
  .tag.thinking .st{color:#cf8a30}
  .tag.sel{box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 35%,transparent),0 6px 16px rgba(120,80,40,.25)}
  @keyframes blink{50%{opacity:.45}}

  /* ---------- activity feed ---------- */
  #feed{position:fixed;left:20px;bottom:54px;z-index:25;width:330px;max-height:34vh;background:rgba(253,244,230,.86);
    backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
  #feed h3{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);padding:12px 14px 8px;display:flex;align-items:center;gap:7px}
  #feed-list{overflow:hidden;padding:0 10px 12px;display:flex;flex-direction:column;gap:2px}
  .feed-row{display:flex;align-items:baseline;gap:8px;padding:5px 6px;border-radius:9px;animation:slideIn .35s ease}
  .feed-row:nth-child(odd){background:rgba(255,255,255,.4)}
  @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
  .fdot{width:7px;height:7px;border-radius:50%;flex:none;transform:translateY(1px)}
  .fname{font-weight:800;font-size:10.5px;flex:none;width:34px}
  .ftext{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink);line-height:1.35}

  /* ---------- ticker ---------- */
  #ticker{position:fixed;left:0;right:0;bottom:0;z-index:28;height:38px;background:linear-gradient(90deg,#3a2c22,#4a3526);
    overflow:hidden;display:flex;align-items:center;border-top:1px solid rgba(255,255,255,.08)}
  #ticker::before{content:'● LIVE TAPE';position:absolute;left:0;top:0;bottom:0;z-index:2;display:flex;align-items:center;
    padding:0 16px;background:#e0764f;color:#fff;font-weight:800;font-size:11px;letter-spacing:.1em;font-family:'Nunito'}
  #ticker-track{display:flex;gap:34px;white-space:nowrap;padding-left:140px;animation:tk 38s linear infinite;color:#f3e6d4;
    font-family:'Space Mono',monospace;font-size:13px}
  #ticker-track .tk b{color:#ffd9a8}
  @keyframes tk{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ---------- detail panel ---------- */
  #panel{position:fixed;top:0;right:0;bottom:0;z-index:40;width:380px;max-width:90vw;background:var(--paper);
    border-left:1px solid var(--line);box-shadow:-16px 0 40px rgba(120,80,40,.18);transform:translateX(105%);
    transition:transform .42s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;--c:#e0913f}
  #panel.open{transform:none}
  .p-head{padding:18px 18px 16px;background:linear-gradient(160deg,color-mix(in srgb,var(--c) 16%,var(--paper)),var(--paper));
    border-bottom:1px solid var(--line);position:relative}
  #p-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:9px;border:1px solid var(--line);
    background:rgba(255,255,255,.6);cursor:pointer;font-size:15px;color:var(--ink-soft);font-weight:800;line-height:1}
  #p-close:hover{background:#fff;color:var(--ink)}
  .p-id{display:flex;align-items:center;gap:13px}
  #p-avatar{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:17px;
    box-shadow:0 6px 16px rgba(120,80,40,.25);transform:rotate(-5deg)}
  #p-name{font-size:19px;font-weight:900;letter-spacing:.01em}
  #p-role{font-size:11.5px;color:var(--ink-soft);font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;line-height:1.3}
  .state-chip{margin-top:9px;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;text-transform:uppercase;
    letter-spacing:.06em;padding:5px 11px;border-radius:999px;background:#ece0cd;color:#8a7257}
  .state-chip::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor}
  .state-chip.working{background:rgba(70,193,135,.18);color:#2f9b6b}
  .state-chip.thinking{background:rgba(234,166,74,.2);color:#cf8a30}
  .state-chip.paused{background:rgba(150,130,110,.2);color:#7a6a58}
  .p-body{flex:1;overflow-y:auto;padding:16px 18px 20px;display:flex;flex-direction:column;gap:16px}
  .p-body::-webkit-scrollbar{width:8px}.p-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .sec-label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;margin-bottom:6px}
  #p-blurb{font-size:13.5px;line-height:1.55;color:var(--ink);text-wrap:pretty}
  .task-card{background:var(--paper2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:11px}
  .task-card .spin{width:16px;height:16px;border-radius:50%;border:2.5px solid color-mix(in srgb,var(--c) 30%,transparent);
    border-top-color:var(--c);animation:spin 1s linear infinite;flex:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  #p-task{font-size:13px;font-weight:700;font-family:'Space Mono',monospace}
  .logbox{background:#2f2620;border-radius:14px;padding:10px 12px;max-height:240px;overflow-y:auto}
  .logbox::-webkit-scrollbar{width:6px}.logbox::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:6px}
  .logrow{display:flex;gap:9px;padding:3px 0;font-family:'Space Mono',monospace;font-size:11.5px;line-height:1.4;animation:slideIn .3s}
  .logrow .lt{color:#7d6f60;flex:none}
  .logrow .lx{color:#e9dcc8}
  .p-actions{display:flex;gap:9px;padding:14px 18px;border-top:1px solid var(--line);background:var(--paper2)}
  .act{flex:1;cursor:pointer;font-family:inherit;font-weight:800;font-size:12.5px;border-radius:13px;padding:11px;border:1px solid var(--line);
    background:#fff;color:var(--ink);transition:transform .12s,background .15s}
  .act:hover{transform:translateY(-1px)}
  .act.primary{color:#fff;border-color:transparent;box-shadow:0 6px 14px rgba(120,80,40,.22)}

  /* ---------- hint ---------- */
  #hint{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:20;font-size:11.5px;font-weight:700;color:#6b5340;
    background:rgba(253,244,230,.7);backdrop-filter:blur(6px);padding:7px 16px;border-radius:999px;border:1px solid var(--line);
    box-shadow:0 4px 12px rgba(120,80,40,.12);display:flex;gap:14px;pointer-events:none}
  #hint b{color:var(--ink)}
  #loading{position:fixed;inset:0;z-index:60;display:grid;place-items:center;background:#e9c6a0;transition:opacity .6s}
  #loading.gone{opacity:0;pointer-events:none}
  .ld{text-align:center;color:#7a5638}
  .ld .mark{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#f0a35f,#e0764f);margin:0 auto 14px;
    display:grid;place-items:center;color:#fff;font-weight:900;font-size:26px;animation:bob 1.6s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-8px)}}
  .ld p{font-weight:800;letter-spacing:.05em}

  @media (max-width:720px){
    #feed{width:auto;right:20px}
    #roster{max-width:none;right:20px}
    #panel{width:100%}
  }
</style>
</head>
<body>
  <div id="scene"></div>
  <div id="grade"></div>
  <div id="grade2"></div>
  <div id="labels"></div>

  <div id="topbar">
    <div class="brand">
      <div class="mark">◐</div>
      <div>
        <h1>VIRTUAL OFFICE</h1>
        <div class="sub"><span class="live"></span> AI Investment Desk · live</div>
      </div>
    </div>
    <div class="topright">
      <div class="pillbox"><span class="wx">☀️</span><div><div class="clk" id="clock">3:47 PM</div><div class="day">Tue · sunny 24°</div></div></div>
      <button class="btn" id="btn-reset">⤢ Reset view</button>
    </div>
  </div>

  <div id="roster"></div>

  <div id="feed">
    <h3><span class="live"></span> Activity feed</h3>
    <div id="feed-list"></div>
  </div>

  <div id="hint"><span><b>Drag</b> to orbit</span><span><b>Scroll</b> to zoom</span><span><b>Click</b> an agent</span></div>

  <aside id="panel">
    <div class="p-head">
      <button id="p-close">✕</button>
      <div class="p-id">
        <div id="p-avatar">PM</div>
        <div>
          <div id="p-name">Portfolio Manager</div>
          <div id="p-role">Allocation</div>
          <span class="state-chip" id="p-state">idle</span>
        </div>
      </div>
    </div>
    <div class="p-body">
      <div>
        <div class="sec-label">About this agent</div>
        <p id="p-blurb"></p>
      </div>
      <div>
        <div class="sec-label">Current task</div>
        <div class="task-card"><div class="spin"></div><div id="p-task">—</div></div>
      </div>
      <div>
        <div class="sec-label">Live output / logs</div>
        <div class="logbox"><div id="p-log"></div></div>
      </div>
    </div>
    <div class="p-actions">
      <button class="act" id="btn-pause">❚❚ Pause agent</button>
      <button class="act primary" id="btn-handoff">Hand off ▸</button>
    </div>
  </aside>

  <div id="ticker"><div id="ticker-track"></div></div>

  <div id="loading"><div class="ld"><div class="mark">◐</div><p>Opening the office…</p></div></div>

  <!-- Three.js core -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/controls/OrbitControls.js"></script>

  <!-- Model loader (dynamically loads all models/ files) -->
  <script src="models/loader.js"></script>

  <!-- Agent definitions + UI + app logic -->
  <script src="office/agents.js"></script>
  <script src="office/ui.js"></script>
  <script src="office/app.js"></script>

  <script>
    window.addEventListener('load', function () {
      // Load all 3D models dynamically, then init the app
      window.ModelsLoader.load().then(function () {
        try {
          window.OfficeApp.init();
          window.OfficeUI.wire();
        } catch (e) { console.error(e); }
        setTimeout(function(){ document.getElementById('loading').classList.add('gone'); }, 400);
      });
      // live clock
      function tick(){
        var base = new Date(2026,5,3,15,47,0);
        base.setSeconds(base.getSeconds() + Math.floor(performance.now()/1000));
        var el = document.getElementById('clock');
        if (el) el.textContent = base.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
      }
      setInterval(tick, 1000); tick();

      // Bridge: receive agent-state updates from parent frame (AlphaOps WebSocket)
      window.addEventListener('message', function (e) {
        if (!e.data || e.data.type !== 'agent-state') return;
        var app = window.OfficeApp;
        if (!app || !app.forceAgentState) return;
        app.forceAgentState(e.data.id, e.data.state);
      });
    });
  </script>
</body>
</html>
